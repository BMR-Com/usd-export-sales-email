name: Cotton On-Call Weekly Update

on:
  schedule:
    - cron: '30 19 * * 4'   # 3:30pm EDT (UTC-4, Mar–Nov)
    - cron: '30 20 * * 4'   # 3:30pm EST (UTC-5, Nov–Mar)
  workflow_dispatch:
    inputs:
      build_web_only:
        description: 'Just copy existing CSV to web folder (no scraping, no email)'
        type: boolean
        default: false
      force_email:
        description: 'Force send email even if no new data'
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip uninstall -y fpdf || true
          pip install requests beautifulsoup4 fpdf2 playwright

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 \
            libpango-1.0-0 libcairo2 libatspi2.0-0

      # ── BUILD-ONLY: copy CSV → web folder, done in ~10 seconds ──────────
      - name: Build web data only (no scraping)
        if: ${{ github.event.inputs.build_web_only == 'true' }}
        run: |
          python3 - << 'PYEOF'
          import os, shutil
          src  = 'data/cotton_oncall.csv'
          dest = 'cotton_oncall/cotton_oncall_data.csv'
          if not os.path.exists(src):
              print(f'ERROR: {src} not found')
              exit(1)
          os.makedirs('cotton_oncall', exist_ok=True)
          shutil.copy2(src, dest)
          rows = open(src).read().count('\n')
          print(f'Copied {rows} rows -> {dest}')
          PYEOF

      - name: Commit web data file (build-only)
        if: ${{ github.event.inputs.build_web_only == 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cotton_oncall/cotton_oncall_data.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "data: build cotton_oncall_data.csv [skip ci]"
            git push
          fi

      # ── NORMAL: scrape CFTC + render page as PDF + email + commit ───────
      - name: Run Cotton On-Call scraper
        if: ${{ github.event.inputs.build_web_only != 'true' }}
        env:
          SMTP_HOST:   ${{ secrets.SMTP_HOST }}
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:  ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
          FORCE_EMAIL: ${{ github.event.inputs.force_email }}
        run: python scripts/scrape_cotton_oncall.py

      - name: Commit updated data files
        if: ${{ github.event.inputs.build_web_only != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cotton_oncall.csv
          git add cotton_oncall/cotton_oncall_data.csv || true
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "data: cotton on-call update $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
