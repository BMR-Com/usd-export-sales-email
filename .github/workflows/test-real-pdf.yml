name: Test Email with Real PDF

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 fpdf2 matplotlib

      - name: Download Unicode fonts
        run: |
          mkdir -p fonts
          curl -sL -o fonts/DejaVuSans.ttf https://github.com/dejavu-fonts/dejavu-fonts/raw/master/ttf/DejaVuSans.ttf
          curl -sL -o fonts/DejaVuSans-Bold.ttf https://github.com/dejavu-fonts/dejavu-fonts/raw/master/ttf/DejaVuSans-Bold.ttf

      - name: Create patched PDF generator
        run: |
          cat > scripts/generate_pdf_fixed.py << 'EOFPY'
          import os, sys, io, re
          from datetime import datetime
          
          # Import original functions
          sys.path.insert(0, os.path.dirname(__file__))
          from scrape_cotton_oncall import (
              read_existing_dates, read_all_rows, append_rows, 
              get_candidate_urls, parse_report, check_for_new_reports,
              MONTH_MAP, MONTH_MAP_ABBR, CSV_COLS, CSV_PATH, WEB_CSV,
              BASE, BASE_PATH, HEADERS, HEADERS_NOCACHE, now, to_int,
              get_old_new, parse_date_from_text, MAX_RETRIES, RETRY_INTERVAL
          )
          
          def generate_pdf_fixed(new_rows, all_rows_for_charts):
              """Generate PDF with Unicode font support"""
              try:
                  import matplotlib
                  matplotlib.use('Agg')
                  import matplotlib.pyplot as plt
                  from fpdf import FPDF
              except ImportError as e:
                  print(f"[{now()}] PDF lib missing ({e})")
                  return None
          
              if not new_rows:
                  return None
                  
              report_date = new_rows[0].get("Report Date", "")
              current_year = datetime.now().year
              start_year = current_year - 5
          
              # Constants
              M = 8
              W = 297
              UW = W - 2 * M
              CW = (UW - 4) / 3
              Y_HDR = M
              Y_SUM = 17
              Y_TBL = 54
              Y_CLBL1 = 127
              Y_CH1 = 132
              CH1_H = 70
              Y_CLBL2 = 17
              Y_CH2 = 22
              CH2_H = 83
              Y_CLBL3 = 106
              Y_CH3 = 111
              CH3_H = 91
              TBL_ROW_H = 3.8
              MAX_TBL_ROWS = 16
              CM = [3, 5, 7, 10, 12]
          
              # Build DATA
              DATA = {}
              for r in all_rows_for_charts:
                  yr = r.get("Report Year", "").strip()
                  if not yr and "/" in r.get("Report Date", ""):
                      yr = r["Report Date"].split("/")[2]
                  try:
                      wk = int(round(float(r.get("Week #", 0))))
                  except:
                      continue
                  on = r.get("Old/New", "")
                  if not yr or not wk or on == "total":
                      continue
                  try:
                      mon = int(float(r.get("Month", 0)))
                  except:
                      mon = 0
                  try:
                      p = int(r.get("Unfixed Call Purchases", 0) or 0)
                  except:
                      p = 0
                  try:
                      s = int(r.get("Unfixed Call Sales", 0) or 0)
                  except:
                      s = 0
                  if yr not in DATA:
                      DATA[yr] = {}
                  if wk not in DATA[yr]:
                      DATA[yr][wk] = {}
                  if mon not in DATA[yr][wk]:
                      DATA[yr][wk][mon] = {"oP": 0, "oS": 0, "aP": 0, "aS": 0}
                  DATA[yr][wk][mon]["aP"] += p
                  DATA[yr][wk][mon]["aS"] += s
                  if on == "old":
                      DATA[yr][wk][mon]["oP"] += p
                      DATA[yr][wk][mon]["oS"] += s
          
              all_years = sorted(DATA.keys())
              max_wk = max((max(wks.keys()) for wks in DATA.values() if wks), default=52)
              weeks = list(range(1, max_wk + 1))
              years20 = all_years[-20:]
          
              def slot_get(yr, wk):
                  if yr not in DATA or wk not in DATA[yr]:
                      return None
                  slot = DATA[yr][wk]
                  if not any(m in slot for m in CM):
                      return None
                  aP = sum(slot[m]["aP"] for m in CM if m in slot)
                  aS = sum(slot[m]["aS"] for m in CM if m in slot)
                  oP = sum(slot[m]["oP"] for m in CM if m in slot)
                  oS = sum(slot[m]["oS"] for m in CM if m in slot)
                  return {"aP": aP, "aS": aS, "oP": oP, "oS": oS, "nP": aP - oP, "nS": aS - oS}
          
              def get_val(ci, yr, wk):
                  v = slot_get(yr, wk)
                  if v is None:
                      return None
                  keys = [("oP", "oS"), ("aP", "aS"), ("nP", "nS")][ci // 3]
                  p2, s2 = v[keys[0]], v[keys[1]]
                  return [p2, s2, s2 - p2][ci % 3]
          
              cur_wk = None
              for r in new_rows:
                  try:
                      cur_wk = int(round(float(r.get("Week #", 0))))
                      break
                  except:
                      pass
          
              # Summary computation
              def cur_crop(rows, crop):
                  s = p = cs = cp = 0
                  for r in rows:
                      on = r.get("Old/New", "")
                      if on == "total":
                          continue
                      if crop == "old" and on != "old":
                          continue
                      if crop == "new" and on == "old":
                          continue
                      try:
                          s += int(r.get("Unfixed Call Sales", 0) or 0)
                      except:
                          pass
                      try:
                          p += int(r.get("Unfixed Call Purchases", 0) or 0)
                      except:
                          pass
                      try:
                          cs += int(r.get("Chg Sales", 0) or 0)
                      except:
                          pass
                      try:
                          cp += int(r.get("Chg Purchases", 0) or 0)
                      except:
                          pass
                  return s, p, s - p, cs, cp, cs - cp
          
              def hist(ci_idx, wk):
                  vals = []
                  for yr in years20:
                      v = get_val(ci_idx, yr, wk)
                      if v is not None:
                          vals.append(v)
                  avg = round(sum(vals) / len(vals)) if vals else None
                  mn = min(vals) if vals else None
                  mx = max(vals) if vals else None
                  pct = round(100 * sum(1 for v in vals if v <= vals[0]) / len(vals)) if vals else None
                  return avg, mn, mx, vals
          
              SUM = {}
              CI_MAP = {"old": (1, 0, 2), "all": (4, 3, 5), "new": (7, 6, 8)}
              for crop in ["old", "all", "new"]:
                  s, p, imb, cs, cp, ci_ = cur_crop(new_rows, crop)
                  si, pi, ii = CI_MAP[crop]
                  savg, smn, smx, svals = hist(si, cur_wk)
                  pavg, pmn, pmx, pvals = hist(pi, cur_wk)
                  iavg, imn, imx, ivals = hist(ii, cur_wk)
                  spct = round(100 * sum(1 for v in svals if v <= s) / len(svals)) if svals else None
                  ppct = round(100 * sum(1 for v in pvals if v <= p) / len(pvals)) if pvals else None
                  ipct = round(100 * sum(1 for v in ivals if v <= imb) / len(ivals)) if ivals else None
                  SUM[crop] = {
                      "s": s, "p": p, "imb": imb, "cs": cs, "cp": cp, "ci": ci_,
                      "savg": savg, "smn": smn, "smx": smx, "spct": spct,
                      "pavg": pavg, "pmn": pmn, "pmx": pmx, "ppct": ppct,
                      "iavg": iavg, "imn": imn, "imx": imx, "ipct": ipct,
                  }
          
              # Chart builder
              COLORS = ['#1a6b3c', '#c0392b', '#2e86c1', '#8e44ad', '#d35400', '#16a085', '#f39c12', '#1a3a5c']
              TITLES = [
                  'Old Crop - Purchases', 'Old Crop - Sales', 'Old Crop - Imbalance',
                  'All Crop - Purchases', 'All Crop - Sales', 'All Crop - Imbalance',
                  'New Crop - Purchases', 'New Crop - Sales', 'New Crop - Imbalance'
              ]
              cur_yr = datetime.now().year
              def_years = [y for y in all_years if cur_yr - 4 <= int(y) <= cur_yr and int(y) > 2005]
          
              def make_chart(ci, w_mm, h_mm, dpi=120):
                  fig, ax = plt.subplots(figsize=(w_mm / 25.4, h_mm / 25.4), dpi=dpi)
                  fig.patch.set_facecolor('white')
                  maxV, minV = [], []
                  for wk in weeks:
                      vs = [get_val(ci, y, wk) for y in years20]
                      vs = [v for v in vs if v is not None]
                      maxV.append(max(vs) if vs else None)
                      minV.append(min(vs) if vs else None)
                  idx = [i for i in range(len(weeks)) if maxV[i] is not None]
                  if idx:
                      ax.fill_between(
                          [weeks[i] for i in idx],
                          [minV[i] for i in idx],
                          [maxV[i] for i in idx],
                          alpha=0.14, color='#4a90d9', zorder=0, label='20yr Range'
                      )
                  for yi, yr in enumerate(def_years):
                      vals = [get_val(ci, yr, wk) for wk in weeks]
                      ax.plot(
                          weeks, vals, color=COLORS[yi % len(COLORS)],
                          linewidth=1.8 if yr == str(cur_yr) else 1.1, label=yr, zorder=2
                      )
                  ax.set_title(TITLES[ci], fontsize=6.5, fontweight='bold', color='#1a3a5c', pad=2)
                  ax.tick_params(labelsize=4.5, pad=1)
                  ax.yaxis.set_major_formatter(plt.FuncFormatter(
                      lambda x, _: f'{int(x/1000)}k' if abs(x) >= 1000 else str(int(x))))
                  ax.grid(axis='y', color='#efefef', linewidth=0.4)
                  ax.spines['top'].set_visible(False)
                  ax.spines['right'].set_visible(False)
                  ax.set_xlim(1, max_wk)
                  ax.legend(fontsize=4, loc='upper right', framealpha=0.6, ncol=3,
                           columnspacing=0.4, handlelength=0.8, handletextpad=0.3)
                  plt.tight_layout(pad=0.15)
                  buf = io.BytesIO()
                  fig.savefig(buf, format='png', dpi=dpi, bbox_inches='tight',
                             facecolor='white', edgecolor='none')
                  plt.close(fig)
                  buf.seek(0)
                  return buf.read()
          
              # Pre-render all 9 charts
              imgs = {}
              for ci in range(9):
                  h = CH1_H if ci < 3 else (CH2_H if ci < 6 else CH3_H)
                  imgs[ci] = make_chart(ci, CW, h)
                  tmp = f'/tmp/ch{ci}.png'
                  with open(tmp, 'wb') as f:
                      f.write(imgs[ci])
          
              # PDF helpers
              def n(v):
                  try:
                      iv = int(v)
                      return f'({abs(iv):,})' if iv < 0 else f'{iv:,}'
                  except:
                      return '--' if (v is None or str(v).strip() == '') else str(v)
          
              def chg(v):
                  try:
                      iv = int(v)
                      return ('+' if iv > 0 else '') + f'{iv:,}'
                  except:
                      return '--'
          
              def pbar(p):
                  if p is None:
                      return '--'
                  return f'{p}% ' + ('H' if p >= 70 else ('L' if p <= 30 else 'M'))
          
              # Build PDF with Unicode font
              pdf = FPDF(orientation='L', unit='mm', format='A4')
              
              # Add Unicode fonts
              font_dir = os.path.join(os.path.dirname(__file__), "..", "fonts")
              pdf.add_font("DejaVu", "", os.path.join(font_dir, "DejaVuSans.ttf"), uni=True)
              pdf.add_font("DejaVu", "B", os.path.join(font_dir, "DejaVuSans-Bold.ttf"), uni=True)
          
              def hdr_bar(txt):
                  pdf.set_fill_color(26, 58, 92)
                  pdf.set_text_color(255, 255, 255)
                  pdf.rect(M, Y_HDR, UW, 9, 'F')
                  pdf.set_font("DejaVu", "B", 9)
                  pdf.set_xy(M + 2, Y_HDR + 1.5)
                  pdf.cell(UW - 4, 6, txt, ln=0)
                  pdf.set_text_color(0, 0, 0)
          
              def sec_bar(y, txt):
                  pdf.set_fill_color(26, 58, 92)
                  pdf.set_text_color(255, 255, 255)
                  pdf.set_font("DejaVu", "B", 6.5)
                  pdf.set_xy(M, y)
                  pdf.cell(UW, 4.5, f'  {txt}', border=0, ln=1, fill=True, align='L')
                  pdf.set_text_color(0, 0, 0)
          
              # Page 1
              pdf.add_page()
              hdr_bar(f'CFTC Cotton On-Call Report  -  {report_date}  -  Week {cur_wk}')
          
              # Summary
              pdf.set_xy(M, Y_SUM)
              pdf.set_font("DejaVu", "B", 7)
              pdf.set_fill_color(235, 242, 250)
              pdf.cell(UW, 5, f'Weekly Summary - Unfixed Call Positions vs 20-Year History  (Week {cur_wk})',
                      border=0, ln=1, fill=True, align='C')
          
              SCOLS = [40, 22, 14, 22, 14, 22, 14, 22, 22, 15, 15]
              SHDRS = ['', 'Sales', 'Chg', 'Purchases', 'Chg', 'Imbalance', 'Chg',
                      '20yr Avg S', '20yr Avg P', 'Pct S', 'Pct P']
              RH = 4.2
          
              pdf.set_font("DejaVu", "B", 6)
              pdf.set_fill_color(205, 218, 232)
              pdf.set_text_color(30, 30, 30)
              pdf.set_xy(M, pdf.get_y())
              for h, w in zip(SHDRS, SCOLS):
                  pdf.cell(w, RH, h, border=0, ln=0, align='C', fill=True)
              pdf.ln()
          
              CROP_LBL = {"old": "OLD CROP", "all": "ALL CROP", "new": "NEW CROP (All - Old)"}
              BG = {"old": (255, 252, 230), "all": (240, 245, 255), "new": (245, 255, 245)}
              for crop in ["old", "all", "new"]:
                  d = SUM[crop]
                  pdf.set_text_color(255, 255, 255)
                  pdf.set_fill_color(40, 80, 130)
                  pdf.set_font("DejaVu", "B", 6)
                  pdf.set_xy(M, pdf.get_y())
                  pdf.cell(UW, 3.5, f'  {CROP_LBL[crop]}', border=0, ln=1, fill=True, align='L')
                  pdf.set_text_color(0, 0, 0)
                  pdf.set_fill_color(*BG[crop])
                  pdf.set_font("DejaVu", "", 6.5)
                  pdf.set_xy(M, pdf.get_y())
                  row_vals = ['Current', n(d['s']), chg(d['cs']), n(d['p']), chg(d['cp']),
                             n(d['imb']), chg(d['ci']),
                             n(d['savg']), n(d['pavg']), pbar(d['spct']), pbar(d['ppct'])]
                  for val, w in zip(row_vals, SCOLS):
                      pdf.cell(w, RH, str(val), border=0, ln=0, align='R' if val != row_vals[0] else 'L', fill=True)
                  pdf.ln()
                  # 20yr range sub-row
                  pdf.set_font("DejaVu", "", 5.5)
                  pdf.set_fill_color(250, 252, 255)
                  pdf.set_xy(M, pdf.get_y())
                  rng_vals = ['20yr Range',
                             n(d['smn']) + '-' + n(d['smx']), '',
                             n(d['pmn']) + '-' + n(d['pmx']), '',
                             n(d['imn']) + '-' + n(d['imx']), '', '', '', '', '']
                  for val, w in zip(rng_vals, SCOLS):
                      pdf.cell(w, 3.2, str(val), border=0, ln=0, align='R' if val != rng_vals[0] else 'L', fill=True)
                  pdf.ln()
          
              # Table
              pdf.set_xy(M, Y_TBL)
              TCOLS = [50, 22, 15, 24, 15, 24, 15]
              THEADS = ['Futures Based On', 'Sales', 'Chg', 'Purchases', 'Chg', 'At Close', 'Chg']
              pdf.set_font("DejaVu", "B", 6.5)
              pdf.set_fill_color(26, 58, 92)
              pdf.set_text_color(255, 255, 255)
              for h, w in zip(THEADS, TCOLS):
                  pdf.cell(w, 5, h, border=0, ln=0, align='L' if h == THEADS[0] else 'R', fill=True)
              pdf.ln()
              pdf.set_text_color(0, 0, 0)
          
              data_rows = sorted(
                  [r for r in new_rows if r.get("Old/New", "") not in ("total", "")],
                  key=lambda r: (0 if r.get("Old/New") == "old" else 1,
                                float(r.get("Yr", 0) or 0), float(r.get("Month", 0) or 0))
              )
              tot_rows = [r for r in new_rows if r.get("Old/New", "") == "total"]
          
              for r in data_rows[:MAX_TBL_ROWS]:
                  on = r.get("Old/New", "")
                  bg = (255, 252, 220) if on == "old" else (246, 255, 243)
                  pdf.set_fill_color(*bg)
                  pdf.set_font("DejaVu", "", 6)
                  pdf.cell(TCOLS[0], TBL_ROW_H, str(r.get("Futures Based On", "")), border=0, ln=0, align='L', fill=True)
                  for val, cw in [(r.get("Unfixed Call Sales"), TCOLS[1]), (r.get("Chg Sales"), TCOLS[2]),
                                 (r.get("Unfixed Call Purchases"), TCOLS[3]), (r.get("Chg Purchases"), TCOLS[4]),
                                 (r.get("At Close"), TCOLS[5]), (r.get("Chg At Close"), TCOLS[6])]:
                      pdf.cell(cw, TBL_ROW_H, n(val), border=0, ln=0, align='R', fill=True)
                  pdf.ln()
          
              if tot_rows:
                  tr = tot_rows[0]
                  pdf.set_font("DejaVu", "B", 6.5)
                  pdf.set_fill_color(220, 235, 251)
                  pdf.cell(TCOLS[0], 4.5, 'Totals', border=0, ln=0, align='L', fill=True)
                  for val, cw in [(tr.get("Unfixed Call Sales"), TCOLS[1]), (tr.get("Chg Sales"), TCOLS[2]),
                                 (tr.get("Unfixed Call Purchases"), TCOLS[3]), (tr.get("Chg Purchases"), TCOLS[4]),
                                 (tr.get("At Close"), TCOLS[5]), (tr.get("Chg At Close"), TCOLS[6])]:
                      pdf.cell(cw, 4.5, n(val), border=0, ln=0, align='R', fill=True)
                  pdf.ln()
          
              # Old Crop charts
              sec_bar(Y_CLBL1, 'OLD CROP')
              for i, ci in enumerate([0, 1, 2]):
                  pdf.image(f'/tmp/ch{ci}.png', x=M + i * (CW + 2), y=Y_CH1, w=CW, h=CH1_H)
          
              # Page 2
              pdf.add_page()
              hdr_bar(f'CFTC Cotton On-Call - Historical Charts  -  {report_date}')
          
              # All Crop charts
              sec_bar(Y_CLBL2, 'ALL CROP')
              for i, ci in enumerate([3, 4, 5]):
                  pdf.image(f'/tmp/ch{ci}.png', x=M + i * (CW + 2), y=Y_CH2, w=CW, h=CH2_H)
          
              # New Crop charts
              sec_bar(Y_CLBL3, 'NEW CROP (All minus Old)')
              for i, ci in enumerate([6, 7, 8]):
                  pdf.image(f'/tmp/ch{ci}.png', x=M + i * (CW + 2), y=Y_CH3, w=CW, h=CH3_H)
          
              return pdf.output()
          
          
          def send_email_fixed(pdf_bytes, report_date):
              """Send PDF via Gmail SMTP with SSL"""
              import smtplib, ssl
              from email.mime.multipart import MIMEMultipart
              from email.mime.text import MIMEText
              from email.mime.base import MIMEBase
              from email import encoders
              
              smtp_host = os.environ.get('SMTP_HOST', '')
              smtp_port = int(os.environ.get('SMTP_PORT', 465))
              smtp_user = os.environ.get('SMTP_USER', '')
              smtp_pass = os.environ.get('SMTP_PASS', '')
              email_from = os.environ.get('EMAIL_FROM', '')
              email_to = os.environ.get('EMAIL_TO', '')
          
              if not all([smtp_host, smtp_user, smtp_pass, email_from, email_to]):
                  print(f"[{now()}] Email env vars not set - skipping")
                  return
          
              recipients = [e.strip() for e in email_to.split(',') if e.strip()]
              fname = f"cotton_oncall_{report_date.replace('/','_')}.pdf"
          
              msg = MIMEMultipart()
              msg['From'] = email_from
              msg['To'] = ', '.join(recipients)
              msg['Subject'] = f"[BMR] Cotton On-Call Report - {report_date}"
              msg['X-Priority'] = '1'
              msg.attach(MIMEText(
                  f"BMR Cotton Analytics - CFTC On-Call Report\n\n"
                  f"Report Date: {report_date}\n"
                  f"Generated: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')} UTC\n"
                  f"Source: CFTC Cotton On-Call\n\n"
                  f"This is an automated report. Do not reply.\n", 'plain'))
          
              part = MIMEBase('application', 'pdf')
              part.set_payload(pdf_bytes)
              encoders.encode_base64(part)
              part.add_header('Content-Disposition', f'attachment; filename="{fname}"')
              msg.attach(part)
          
              try:
                  ctx = ssl.create_default_context()
                  print(f"[{now()}] Connecting to {smtp_host}:{smtp_port}...")
                  with smtplib.SMTP_SSL(smtp_host, smtp_port, context=ctx, timeout=30) as srv:
                      print(f"[{now()}] Logging in...")
                      srv.login(smtp_user, smtp_pass)
                      print(f"[{now()}] Sending to {len(recipients)} recipients...")
                      srv.sendmail(email_from, recipients, msg.as_string())
                  print(f"[{now()}] Email sent successfully")
              except Exception as e:
                  print(f"[{now()}] Email failed: {e}")
                  raise
          
          
          if __name__ == "__main__":
              print(f"[{now()}] Reading CSV...")
              all_rows, count = read_all_rows(CSV_PATH)
              print(f"[{now()}] Found {count} rows")
              
              if count == 0:
                  print(f"[{now()}] No data")
                  sys.exit(1)
              
              new_rows = all_rows[-10:] if count > 10 else all_rows
              report_date = new_rows[-1].get("Report Date", datetime.now().strftime("%m/%d/%Y"))
              
              print(f"[{now()}] Generating PDF for {report_date}...")
              pdf_bytes = generate_pdf_fixed(new_rows, all_rows)
              
              if not pdf_bytes:
                  print(f"[{now()}] PDF failed")
                  sys.exit(1)
              
              print(f"[{now()}] PDF: {len(pdf_bytes)} bytes")
              print(f"[{now()}] Sending email...")
              send_email_fixed(pdf_bytes, report_date)
              print(f"[{now()}] Done")
          EOFPY

      - name: Run test
        env:
          SMTP_HOST:   ${{ secrets.SMTP_HOST }}
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:  ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
        run: python scripts/generate_pdf_fixed.py
