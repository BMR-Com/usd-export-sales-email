name: Test Email Only

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 fpdf2 matplotlib

      - name: Send test email
        env:
          SMTP_HOST:   ${{ secrets.SMTP_HOST }}
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:  ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
        run: |
          cat > scripts/test_email.py << 'EOF'
          import os, sys
          from datetime import datetime
          sys.path.insert(0, os.path.dirname(__file__))
          from scrape_cotton_oncall import send_email

          def now():
              return datetime.now().strftime('%H:%M:%S')

          SMTP_HOST = os.getenv('SMTP_HOST')
          SMTP_PORT = os.getenv('SMTP_PORT', '465')
          SMTP_USER = os.getenv('SMTP_USER')
          SMTP_PASS = os.getenv('SMTP_PASS')
          EMAIL_FROM = os.getenv('EMAIL_FROM')
          EMAIL_TO = os.getenv('EMAIL_TO')

          if not all([SMTP_HOST, SMTP_USER, SMTP_PASS, EMAIL_FROM, EMAIL_TO]):
              print(f"[{now()}] ❌ Missing email secrets")
              sys.exit(1)

          # Minimal valid PDF
          pdf_bytes = b'%PDF-1.4\n1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj\n2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>endobj\n3 0 obj<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]>>endobj\nxref\n0 4\n0000000000 65535 f \n0000000009 00000 n \n0000000052 00000 n \n0000000101 00000 n \ntrailer<</Size 4/Root 1 0 R>>\nstartxref\n147\n%%EOF'

          print(f"[{now()}] Sending test email to {EMAIL_TO}...")
          try:
              send_email(pdf_bytes, "04/09/2026")
              print(f"[{now()}] ✅ Test email sent successfully")
          except Exception as e:
              print(f"[{now()}] ❌ Failed: {e}")
              sys.exit(1)
          EOF
          
          python scripts/test_email.py
