name: Options Analytics Weekly Report

on:
  schedule:
    - cron: '31 20 * * 5'
    - cron: '31 21 * * 5'
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Force send even if already sent today'
        required: false
        default: 'false'
      build_only:
        description: 'Only build data file, skip email'
        required: false
        default: 'false'

jobs:
  build-and-send:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build cotton_options_data.csv from CSV
        id: build_data
        run: |
          if [ -f data/cotton_options_history.csv ]; then
            echo "Found CSV: $(wc -l < data/cotton_options_history.csv) lines, $(wc -c < data/cotton_options_history.csv) bytes"
            python scripts/build_options_data.py
            echo "built=true" >> $GITHUB_OUTPUT
            echo "File size: $(wc -c < cotton_options/cotton_options_data.csv) bytes"
          else
            echo "ERROR: data/cotton_options_history.csv not found"
            echo "built=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Commit cotton_options_data.csv immediately
        if: steps.build_data.outputs.built == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cotton_options/cotton_options_data.csv
          if git diff --staged --quiet; then
            echo "No changes — data file already up to date"
          else
            git commit -m "data: update cotton_options_data.csv [skip ci]"
            git push
            echo "Committed and pushed cotton_options_data.csv"
          fi

      - name: Check if already sent today
        id: check_sent
        run: |
          TODAY=$(TZ="America/New_York" date +%Y-%m-%d)
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          FORCE="${{ github.event.inputs.force_send }}"
          BUILD_ONLY="${{ github.event.inputs.build_only }}"
          if [ "$BUILD_ONLY" = "true" ]; then
            echo "already_sent=true" >> $GITHUB_OUTPUT
            echo "Build-only mode — skipping email"
          elif [ -f "data/options_last_sent.txt" ] && grep -q "$TODAY" "data/options_last_sent.txt" && [ "$FORCE" != "true" ]; then
            echo "already_sent=true" >> $GITHUB_OUTPUT
            echo "Already sent today — skipping"
          else
            echo "already_sent=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Playwright Chromium
        if: steps.check_sent.outputs.already_sent == 'false'
        run: |
          playwright install chromium
          sudo apt-get update -qq
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2 libatspi2.0-0

      - name: Verify SMTP secrets
        if: steps.check_sent.outputs.already_sent == 'false'
        run: |
          MISSING=0
          [ -n "${{ secrets.SMTP_HOST }}" ]  || { echo "MISSING SMTP_HOST";  MISSING=1; }
          [ -n "${{ secrets.SMTP_PORT }}" ]  || { echo "MISSING SMTP_PORT";  MISSING=1; }
          [ -n "${{ secrets.SMTP_USER }}" ]  || { echo "MISSING SMTP_USER";  MISSING=1; }
          [ -n "${{ secrets.SMTP_PASS }}" ]  || { echo "MISSING SMTP_PASS";  MISSING=1; }
          [ -n "${{ secrets.EMAIL_FROM }}" ] || { echo "MISSING EMAIL_FROM"; MISSING=1; }
          [ -n "${{ secrets.EMAIL_TO }}" ]   || { echo "MISSING EMAIL_TO";   MISSING=1; }
          [ $MISSING -eq 1 ] && exit 1 || echo "All secrets present"

      - name: Generate PDF and send email
        if: steps.check_sent.outputs.already_sent == 'false'
        env:
          SMTP_HOST:   ${{ secrets.SMTP_HOST }}
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:  ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
          HTML_FILE:   ${{ github.workspace }}/cotton_options/index.html
          REPORT_DATE: ${{ steps.check_sent.outputs.today }}
        run: python scripts/send_options_report.py

      - name: Mark as sent
        if: steps.check_sent.outputs.already_sent == 'false' && success()
        run: |
          echo "${{ steps.check_sent.outputs.today }}" > data/options_last_sent.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/options_last_sent.txt
          git commit -m "chore: options report sent ${{ steps.check_sent.outputs.today }} [skip ci]" || true
          git push
