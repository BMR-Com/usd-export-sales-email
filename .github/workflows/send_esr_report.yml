name: ESR Weekly Email Report

on:
  schedule:
    # Thursday 8:30 PM EST = Friday 01:30 UTC (EST winter) / 00:30 UTC (EDT summer)
    # Using 01:30 UTC to be safe — runs 1 hour late in summer, on-time in winter
    - cron: '30 1 * * 5'    # Friday 01:30 UTC = Thursday 8:30 PM EST
    
    # Backup checks for holiday delays
    - cron: '30 8 * * 5'   # Friday 08:30 UTC = Friday 3:30 AM EST
    - cron: '0 18 * * 5'   # Friday 18:00 UTC = Friday 1:00 PM EST
    
    # Monday recap
    - cron: '0 14 * * 1'   # Monday 14:00 UTC = Monday 9:00 AM EST / 10:00 AM EDT
    
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Force send even if already sent today (true/false)'
        required: false
        default: 'false'

jobs:
  send-report:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if already sent today
        id: check_sent
        run: |
          TODAY=$(TZ="America/New_York" date +%Y-%m-%d)
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          FORCE="${{ github.event.inputs.force_send }}"
          echo "Date (ET): $TODAY  |  Force: $FORCE"
          if [ -f data/last_sent.txt ]; then
            echo "last_sent.txt: $(cat data/last_sent.txt)"
          fi
          if [ -f data/last_sent.txt ] && grep -q "$TODAY" data/last_sent.txt && [ "$FORCE" != "true" ]; then
            echo "already_sent=true" >> $GITHUB_OUTPUT
            echo "SKIPPING — already sent today. Use force_send=true to override."
          else
            echo "already_sent=false" >> $GITHUB_OUTPUT
            echo "PROCEEDING — will send report for $TODAY"
          fi

      - name: Set up Python 3.11
        if: steps.check_sent.outputs.already_sent == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        if: steps.check_sent.outputs.already_sent == 'false'
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright Chromium + system dependencies
        if: steps.check_sent.outputs.already_sent == 'false'
        run: |
          playwright install chromium
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 \
            libpango-1.0-0 libcairo2 libatspi2.0-0

      - name: Verify secrets
        if: steps.check_sent.outputs.already_sent == 'false'
        run: |
          MISSING=0
          [ -n "${{ secrets.SMTP_HOST }}" ]  && echo "OK SMTP_HOST"  || { echo "MISSING SMTP_HOST";  MISSING=1; }
          [ -n "${{ secrets.SMTP_PORT }}" ]  && echo "OK SMTP_PORT"  || { echo "MISSING SMTP_PORT";  MISSING=1; }
          [ -n "${{ secrets.SMTP_USER }}" ]  && echo "OK SMTP_USER"  || { echo "MISSING SMTP_USER";  MISSING=1; }
          [ -n "${{ secrets.SMTP_PASS }}" ]  && echo "OK SMTP_PASS"  || { echo "MISSING SMTP_PASS";  MISSING=1; }
          [ -n "${{ secrets.EMAIL_FROM }}" ] && echo "OK EMAIL_FROM" || { echo "MISSING EMAIL_FROM"; MISSING=1; }
          [ -n "${{ secrets.EMAIL_TO }}" ]   && echo "OK EMAIL_TO"   || { echo "MISSING EMAIL_TO";   MISSING=1; }
          [ -n "${{ secrets.DASHBOARD_PASSWORD }}" ] && echo "OK DASHBOARD_PASSWORD" || { echo "MISSING DASHBOARD_PASSWORD"; MISSING=1; }
          [ $MISSING -eq 1 ] && echo "One or more secrets missing — check repo Settings > Secrets" && exit 1 || echo "All secrets OK"

      - name: Fetch latest cotton data from USDA API
        if: steps.check_sent.outputs.already_sent == 'false'
        run: |
          echo "Fetching latest cotton data to ensure CSV is up to date..."
          python scripts/fetch_cotton_history.py

      - name: Generate PDF and send email
        if: steps.check_sent.outputs.already_sent == 'false'
        env:
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          HTML_FILE:          ${{ github.workspace }}/index.html
          REPORT_DATE:        ${{ steps.check_sent.outputs.today }}
        run: python scripts/send_report.py

      - name: Commit sent flag and updated files
        if: steps.check_sent.outputs.already_sent == 'false' && success()
        run: |
          TODAY=${{ steps.check_sent.outputs.today }}
          mkdir -p data
          echo "$TODAY" > data/last_sent.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_sent.txt
          [ -f cotton_data.js ] && git add cotton_data.js
          git commit -m "chore: ESR report sent $TODAY [skip ci]" || echo "Nothing to commit"
          git push
